<!DOCTYPE html>
<html>
<head>

<title>Mood Music Player</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<!-- NAVBAR -->

<nav class="flex justify-between p-4 bg-black">

<h1 class="text-xl font-bold">🎧 MoodMusic</h1>

<input id="search"
placeholder="Search songs..."
class="bg-gray-800 px-3 py-2 rounded">

</nav>


<div class="p-8">

<h2 class="text-xl mb-2">How are you feeling today?</h2>



<!-- MOOD BUTTONS -->

<div class="flex gap-3 mt-6 flex-wrap">

<button onclick="loadSongs('happy')" class="bg-yellow-500 px-4 py-2 rounded">😊 Happy</button>

<button onclick="loadSongs('sad')" class="bg-blue-500 px-4 py-2 rounded">😢 Sad</button>

<button onclick="loadSongs('romantic')" class="bg-pink-500 px-4 py-2 rounded">❤️ Romantic</button>

<button onclick="loadSongs('relax')" class="bg-green-500 px-4 py-2 rounded">😌 Relax</button>

</div>


<div class="grid grid-cols-3 gap-6 mt-8">

<!-- PLAYER -->

<div class="col-span-2">

<iframe
id="player"
width="100%"
height="420"
src=""
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
</div>


<!-- SONG LIST -->

<div class="bg-gray-800 p-4 h-[450px] overflow-y-auto">

<h3 class="mb-3">Songs</h3>

<div id="songs"></div>

<h3 class="mt-6">❤️ Favorites</h3>

<div id="favorites"></div>

<h3 class="mt-6">Recently Played</h3>

<div id="recent"></div>

</div>

</div>

</div>


<!-- SPOTIFY STYLE PLAYER -->

<div id="bottomPlayer"
class="fixed bottom-0 left-0 right-0 bg-black p-4 flex justify-between items-center">

<div>

<p id="nowPlaying" class="font-bold">Nothing Playing</p>

</div>

<div class="flex gap-3">

<button onclick="fullscreen()" class="bg-gray-700 px-3 py-1 rounded">
🔳
</button>

<button onclick="minimize()" class="bg-gray-700 px-3 py-1 rounded">
⏹
</button>

</div>

</div>


<script src="js/app.js"></script>

</body>
</html>
