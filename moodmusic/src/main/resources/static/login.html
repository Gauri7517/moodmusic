<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded-lg w-80">

<h2 class="text-xl mb-4 text-center">Login</h2>

<input id="username"
placeholder="Username"
class="w-full p-2 mb-3 bg-gray-700 rounded">

<input id="password"
type="password"
placeholder="Password"
class="w-full p-2 mb-4 bg-gray-700 rounded">

<button onclick="login()"
class="bg-purple-600 w-full p-2 rounded">
Login
</button>

</div>

<script src="js/auth.js"></script>

</body>
</html>
